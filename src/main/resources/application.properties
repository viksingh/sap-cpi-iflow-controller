# ============================================================
# SAP CPI iFlow Controller - Default Configuration
# ============================================================
# NOTE: This file contains only non-sensitive defaults.
# Credentials and tenant URL must be supplied via an external
# config file passed as a command-line argument.
# ============================================================

# --- API Endpoints (relative to base URL) ---
cpi.api.runtime=/api/v1/IntegrationRuntimeArtifacts
cpi.api.deploy=/api/v1/DeployIntegrationDesigntimeArtifact
cpi.api.packageFlows=/api/v1/IntegrationPackages('%s')/IntegrationDesigntimeArtifacts

# --- HTTP Settings ---
http.connect.timeout.ms=30000
http.read.timeout.ms=60000
http.max.retries=3
http.retry.delay.ms=2000

# --- Sync Wait Settings (used with the -sync CLI flag) ---
# How often to poll runtime status while waiting for a deploy/undeploy to settle.
deploy.poll.interval.ms=5000
# Max time to wait for a single iFlow to reach a terminal state before moving on.
deploy.wait.timeout.ms=300000
